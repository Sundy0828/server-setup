services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: ${MC_CONTAINER_NAME:-minecraft}
    ports:
      - "${MC_PORT:-25565}:25565"
    environment:
      - EULA=TRUE
      - TYPE=${MC_TYPE:-PAPER}
      - VERSION=${MC_VERSION:-LATEST}
      - MEMORY=${MC_MEMORY:-6G}
      - TZ=${TZ:-America/New_York}
      - ENABLE_WHITELIST=${MC_ENABLE_WHITELIST:-false}
      - ENABLE_ROLLING_LOGS=true
      - CF_PAGE_URL=${CF_PAGE_URL:-}
      - CF_API_KEY=${CF_API_KEY:-}
    volumes:
      - ./data:/data
    restart: unless-stopped
