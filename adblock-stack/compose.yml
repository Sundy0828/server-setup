services:
  adguardhome:
    image: adguard/adguardhome:latest
    container_name: adguardhome
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "3002:3000/tcp"
      - "8081:8081/tcp"
      - "8081:8081"
    environment:
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./config/work:/opt/adguardhome/work
      - ./config/conf:/opt/adguardhome/conf
    networks:
      - homelab
    restart: unless-stopped

networks:
  homelab:
    external: true
