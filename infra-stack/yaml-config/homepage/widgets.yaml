---
- resources:
    cpu: true
    memory: true
    disk: /

- search:
    provider: google
    target: _blank

- datetime:
    text_size: xl
    format:
      timeStyle: short
      dateStyle: short

- systeminformation:
    cpu: true
    memory: true
    disk: true
    uptime: true
    swapMemory: true
    kernel: true

- docker:
    show: true
    stats: true
    showStats: true
    sort: name
    labels:
      - io.portainer.accesscontrol.public
