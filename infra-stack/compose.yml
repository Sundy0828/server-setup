services:
  # -----------------------
  # 🌐 Reverse Proxy & SSL
  # -----------------------
  nginx-db:
    image: mysql:8.0
    container_name: nginx-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-npm-root-pass}
      MYSQL_DATABASE: npm
      MYSQL_USER: npm
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-npm-pass}
    volumes:
      - ./data/nginx/mysql:/var/lib/mysql
    networks:
      - homelab
    restart: unless-stopped

  nginx:
    image: "jc21/nginx-proxy-manager:latest"
    container_name: nginx-pm
    environment:
      DB_MYSQL_HOST: nginx-db
      DB_MYSQL_PORT: 3306
      DB_MYSQL_USER: npm
      DB_MYSQL_PASSWORD: ${MYSQL_PASSWORD:-npm-pass}
      DB_MYSQL_NAME: npm
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - ./data/nginx/letsencrypt:/etc/letsencrypt
      - ./data/nginx/npm:/data
    depends_on:
      - nginx-db
    networks:
      - homelab
    restart: unless-stopped

  # -----------------------
  # 📦 Container Management
  # -----------------------
  portainer:
    image: portainer/portainer-ce:alpine-sts
    container_name: portainer
    ports:
      - "8000:8000"
      - "9000:9000"
    environment:
      - TZ=${TZ:-America/New_York}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/portainer:/data
    restart: unless-stopped

  # -----------------------
  # ⏰ Monitoring & Uptime
  # -----------------------
  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    ports:
      - "3001:3001"
    environment:
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./data/uptime-kuma:/app/data
    restart: unless-stopped

  # -----------------------
  # 💾 Backup Solution
  # -----------------------
  # Option 1: Duplicati (web UI included, easier to use)
  duplicati:
    image: lscr.io/linuxserver/duplicati:latest
    container_name: duplicati
    ports:
      - "8200:8200"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./data/duplicati:/config
      - ./backups:/backups
      # Add your config directories to backup here
      # Mount other stack configs as read-only for backup
      # - ./data/nginx:/source/nginx:ro
      # - ../adblock-stack/config:/source/adblock:ro
      # - ../homeassistant-stack/config:/source/homeassistant:ro
      # - ../plex-stack/config:/source/plex:ro
      - /:/source/system:ro
    restart: unless-stopped

networks:
  default:
    name: homelab
    external: true

volumes:
  portainer_data:
    driver: local
  uptime_kuma_data:
    driver: local
  duplicati_config:
    driver: local
