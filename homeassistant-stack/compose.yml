services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    ports:
      - "8123:8123"
    environment:
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./config:/config
    networks:
      - homelab
    restart: unless-stopped

networks:
  homelab:
    external: true
